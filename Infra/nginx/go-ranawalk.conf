# Sprint 6 — Item 7: QR Universal short-URL resolver
# Handles go.ranawalk.com/{slug} → /api/qr/{slug} → redirect to ranawalk.com/{lang}/{product}
#
# Slugs:
#   gol → Goliath
#   vel → Velox
#   orb → Orbis
#   leo → Leopard
#   bis → Bison
#
# Deploy: sudo ln -s /etc/nginx/sites-available/go-ranawalk.conf /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name go.ranawalk.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name go.ranawalk.com;

    # SSL managed by Cloudflare Origin Certificate or certbot (production)
    # ssl_certificate     /etc/ssl/certs/go.ranawalk.com.pem;
    # ssl_certificate_key /etc/ssl/private/go.ranawalk.com.key;

    # Self-signed cert (dev/Docker — generated by entrypoint.sh)
    ssl_certificate     /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # QR slug resolver: 5 valid slugs only
    location ~ ^/(gol|vel|orb|leo|bis)$ {
        rewrite ^/(.+)$ /api/qr/$1 break;
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Block everything else
    location / {
        return 404;
    }
}
