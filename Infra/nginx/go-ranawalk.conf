server {
    listen 80;
    listen 443 ssl;
    server_name go.ranawalk.com;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Handle product short slugs with trailing slash fix
    location ~ ^/(gol|vel|orb|leo|bis)$ {
        rewrite ^/(.*)$ /api/qr/$1/ break;
        proxy_pass http://django:8000;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle the full API path for internal redirects
    location /api/qr/ {
        proxy_pass http://django:8000;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect root to main site instead of 404
    location / {
        return 301 https://ranawalk.com/;
    }
}
