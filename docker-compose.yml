services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mwt-postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mwt -d mwt"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 1.0
    user: "postgres"

  redis:
    image: redis:7-alpine
    container_name: mwt-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD not set}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5

  minio:
    image: minio/minio
    container_name: mwt-minio
    restart: unless-stopped
    env_file: .env
    command: server /data --console-address :9001
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    # FIX minio restart loop: 'mc' no existe en la imagen minio/minio -> usar
    # el endpoint HTTP oficial /minio/health/live. curl sí viene en la imagen.
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    mem_limit: 512m
    cpus: 0.5
    # NOTA: se removió 'user: "1000:1000"'. Un volumen nombrado fresco nace
    # con owner root:root y MinIO corriendo como UID 1000 no puede escribir en
    # /data -> crash loop. MinIO ya corre con su usuario interno por defecto.

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mwt-django
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.base
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 300 --preload --worker-class sync --forwarded-allow-ips="*"
    volumes:
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/admin/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    mem_limit: 1g
    cpus: 1.0

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mwt-celery-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.base
    command: celery -A config worker -l info
    # volumes:
    #   - ./backend:/app
    depends_on:
      django:
        condition: service_healthy
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mwt-celery-beat
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.base
    # S8-11: schedule hardcoded in celery.py (D-04) — no DatabaseScheduler
    command: celery -A config beat -l info
    # volumes:
    #   - ./backend:/app
    depends_on:
      django:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery beat' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

#  frontend:
#    build:
#      context: ./frontend
#      dockerfile: Dockerfile
#    container_name: mwt-frontend
#    restart: unless-stopped
#    env_file: .env
#    # command: npm run dev
#    # volumes:
#    #   - ./frontend:/app
#    #   - /app/node_modules
#    ports:
#      - "3000:3000"
#    mem_limit: 512m
#    cpus: 0.5
#    healthcheck:
#      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
#      interval: 30s
#      timeout: 10s
#      retries: 3

  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    container_name: mwt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/mwt.conf:/etc/nginx/conf.d/default.conf
      - ./Infra/nginx/go-ranawalk.conf:/etc/nginx/conf.d/go-ranawalk.conf
      - ./nginx/minio.conf:/etc/nginx/conf.d/minio.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: always
    depends_on:
      django:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ────────────────────────────────────────────────
  # Sprint 4 S4-10: Paperless-ngx (standalone)
  # ────────────────────────────────────────────────
  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: mwt-paperless
    restart: unless-stopped
    ports:
      - "8888:8000"
    volumes:
      - paperless_data:/usr/src/paperless/data
      - paperless_media:/usr/src/paperless/media
      - paperless_consume:/usr/src/paperless/consume
      - paperless_export:/usr/src/paperless/export
    environment:
      PAPERLESS_REDIS: redis://:${REDIS_PASSWORD}@redis:6379
      PAPERLESS_DBHOST: postgres
      PAPERLESS_DBPORT: 5432
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: mwt
      PAPERLESS_DBPASS: ${POSTGRES_PASSWORD:-mwt}
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD:?PAPERLESS_ADMIN_PASSWORD not set}
      PAPERLESS_URL: http://consola.mwt.one/paperless
      PAPERLESS_TIME_ZONE: America/Costa_Rica
      PAPERLESS_OCR_LANGUAGE: spa
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.5

  # ────────────────────────────────────────────────
  # Sprint 8 S8-11: Knowledge microservice (FastAPI)
  # ────────────────────────────────────────────────
  mwt-knowledge:
    build:
      context: ./backend/apps/knowledge
      dockerfile: Dockerfile
    container_name: mwt-knowledge
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"
    volumes:
      - kb_data:/kb            # ← S8-11: KB files persist here; populated by scripts/load_kb.py
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    mem_limit: 512m
    cpus: 0.5

volumes:
  postgres_data:
  minio_data:
  static_volume:
  media_volume:
  paperless_data:
  paperless_media:
  paperless_consume:
  paperless_export:
  kb_data:                     # ← S8-11: Knowledge Base files
