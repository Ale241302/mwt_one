name: Continuous Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/mwt_one
            
            echo "Starting deployment..."
            # 1. Pull latest code
            git pull origin main
            
            # 2. Build and restart services
            docker-compose up -d --build
            
            # 3. Wait for start_period (30s)
            echo "Waiting for services to stabilize (30s)..."
            sleep 30
            
            # 4. Healthcheck: Verify API and Frontend
            echo "Running healthchecks..."
            
            API_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/core/health/ || echo "000")
            DOCS_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/docs/ || echo "000")
            FRONTEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
            
            echo "API Status: $API_HEALTH"
            echo "Docs Status: $DOCS_HEALTH"
            echo "Frontend Status: $FRONTEND_HEALTH"
            
            if [ "$API_HEALTH" != "200" ] || [ "$FRONTEND_HEALTH" != "200" ]; then
              echo "Healthcheck FAILED! Initiating Rollback..."
              # Simplified rollback: revert git and restart
              git checkout HEAD@{1}
              docker-compose up -d --build
              echo "Rollback completed."
              exit 1
            fi
            
            echo "Deployment successful and verified."

      - name: Notify Success
        if: success()
        run: echo "Deployment finished successfully."

      - name: Notify Failure
        if: failure()
        run: echo "Deployment failed or rolled back."
